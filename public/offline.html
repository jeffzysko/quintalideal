<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08a1d6" />
  <title>Sem conexão — Quintal Ideal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #0a1628 0%, #0d2847 60%, #081420 100%);
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: env(safe-area-inset-top, 2rem);
      padding-bottom: env(safe-area-inset-bottom, 2rem);
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .icon {
      width: 72px; height: 72px;
      margin-bottom: 1.5rem;
      opacity: .5;
    }
    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9375rem;
      color: #94a3b8;
      max-width: 320px;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    button {
      background: #08a1d6;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.875rem 2rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }
    .pulse {
      width: 8px; height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .status {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"></line>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
    <line x1="12" y1="20" x2="12.01" y2="20"></line>
  </svg>
  <h1>Sem conexão</h1>
  <p>Verifique sua internet e tente novamente. O app voltará a funcionar normalmente quando a conexão for restabelecida.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
  <div class="status">
    <span class="pulse"></span>
    Aguardando conexão…
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
